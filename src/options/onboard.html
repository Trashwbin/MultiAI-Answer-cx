<!DOCTYPE html>
<html>

<head>
  <meta charset="UTF-8">
  <title>MultiAI Answer - 连接您的 AI 账号</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: #f8f9fa;
      color: #333;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .onboard-container {
      max-width: 480px;
      width: 100%;
      padding: 40px 32px;
      background: #fff;
      border-radius: 12px;
      box-shadow: 0 4px 24px rgba(0, 0, 0, 0.08);
    }

    .onboard-header {
      text-align: center;
      margin-bottom: 32px;
    }

    .onboard-header h1 {
      font-size: 24px;
      font-weight: 600;
      color: #1a1a1a;
    }

    .onboard-header p {
      font-size: 14px;
      color: #666;
      margin-top: 8px;
      line-height: 1.5;
    }

    .step-list {
      display: flex;
      flex-direction: column;
      gap: 10px;
      margin-bottom: 32px;
    }

    .step-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 14px;
      background: #fafafa;
      border-radius: 8px;
      border: 1px solid #eee;
      transition: border-color 0.2s;
    }

    .step-item.connected {
      border-color: #4CAF50;
      background: #f1f8e9;
    }

    .step-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .step-info {
      flex: 1;
      min-width: 0;
    }

    .step-name {
      font-size: 14px;
      font-weight: 500;
      color: #1a1a1a;
    }

    .step-status {
      font-size: 11px;
      color: #999;
      margin-top: 2px;
    }

    .step-status.connected {
      color: #4CAF50;
    }

    .step-btn {
      padding: 6px 14px;
      border: none;
      border-radius: 6px;
      font-size: 12px;
      font-weight: 500;
      cursor: pointer;
      transition: opacity 0.2s;
      flex-shrink: 0;
    }

    .step-btn:hover {
      opacity: 0.85;
    }

    .step-btn:disabled {
      opacity: 0.4;
      cursor: not-allowed;
    }

    .step-btn-connect {
      background: #4CAF50;
      color: #fff;
    }

    .step-btn-done {
      background: #e8f5e9;
      color: #2e7d32;
    }

    .onboard-footer {
      display: flex;
      justify-content: center;
      gap: 12px;
    }

    .btn-start {
      padding: 12px 32px;
      border: none;
      border-radius: 8px;
      background: #4CAF50;
      color: #fff;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
    }

    .btn-start:hover {
      background: #43a047;
      transform: translateY(-1px);
    }

    .btn-skip {
      padding: 12px 24px;
      border: 1px solid #ddd;
      border-radius: 8px;
      background: #fff;
      color: #666;
      font-size: 14px;
      cursor: pointer;
      transition: all 0.2s;
    }

    .btn-skip:hover {
      background: #f5f5f5;
    }

    .progress-bar {
      height: 4px;
      background: #e0e0e0;
      border-radius: 2px;
      margin-bottom: 24px;
      overflow: hidden;
    }

    .progress-fill {
      height: 100%;
      background: #4CAF50;
      border-radius: 2px;
      transition: width 0.3s ease;
      width: 0%;
    }
  </style>
</head>

<body>
  <div class="onboard-container">
    <div class="onboard-header">
      <h1>连接您的 AI 账号</h1>
      <p>登录以下 AI 服务以启用多模型答题。<br>您可以随时跳过，之后在设置中连接。</p>
    </div>
    <div class="progress-bar">
      <div id="progressFill" class="progress-fill"></div>
    </div>
    <div id="stepList" class="step-list"></div>
    <div class="onboard-footer">
      <button id="skipBtn" class="btn-skip">跳过</button>
      <button id="startBtn" class="btn-start">开始使用</button>
    </div>
  </div>
  <script src="auth-onboard.js"></script>
</body>

</html>
